<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile - UPLIFT</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-container{max-width:700px;margin:30px auto;padding:20px;background:#1e293b;border-radius:8px;color:#fff}
    .profile-picture{text-align:center;margin-bottom:20px}
    .profile-picture img{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #ef4444}
    .profile-picture p{color:#94a3b8;font-size:12px;margin-top:8px}
    .profile-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .profile-row .full{grid-column:1/-1}
    input,select{width:100%;padding:8px;border-radius:4px;border:1px solid #334155;background:#071127;color:#fff}
    input[type="file"]{padding:4px}
    .actions{display:flex;gap:10px;margin-top:12px}
    .actions .btn{flex:1}
  </style>
</head>
<body>

<nav>
  <div class="logo">UP<span>LIFT</span></div>
  <ul>
    <li><a href="home.html">Home</a></li>
    <li><a href="chest.html">Chest</a></li>
    <li><a href="back.html">Back</a></li>
    <li><a href="legs.html">Legs</a></li>
    <li><a href="arms.html">Arms</a></li>
    <li><a href="progress.html">Progress</a></li>
    <li><a href="calculator.html">Calculator</a></li>
    <li><a href="profile.html" class="active">Profile</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="#" class="btn">Register</a>
</nav>

<div class="profile-container">
  <h2>Your Profile</h2>
  <p style="color:#94a3b8">Edit your personal details stored locally on this device.</p>
  <div class="profile-picture">
    <div id="p_pic_display" style="display:none">
      <img id="p_pic_img" src="" alt="Profile Picture">
      <p>Click 'Upload Picture' to change</p>
    </div>
    <div id="p_pic_empty" style="display:none;font-size:48px;color:#334155;height:120px;width:120px;margin:0 auto;display:flex;align-items:center;justify-content:center;border:2px dashed #334155;border-radius:50%">
      📷
    </div>
  </div>
  <div class="profile-row" style="margin-top:12px">
    <div>
      <label>Name</label>
      <input id="p_name" type="text">
    </div>
    <div>
      <label>Age</label>
      <input id="p_age" type="number" min="10" max="120">
    </div>
    <div>
      <label>Gender</label>
      <select id="p_gender"><option value="">Select</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select>
    </div>
    <div>
      <label>Body Type</label>
      <select id="p_bodyType"><option value="">Select</option><option value="ectomorph">Ectomorph</option><option value="mesomorph">Mesomorph</option><option value="endomorph">Endomorph</option></select>
    </div>
    <div>
      <label>Phone</label>
      <input id="p_phone" type="tel">
    </div>
    <div>
      <label>Blood Group</label>
      <select id="p_blood"><option value="">Select</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
    </div>
    <div class="full">
      <label>Height (cm)</label>
      <input id="p_height" type="number">
    </div>
    <div class="full">
      <label>Weight (kg)</label>
      <input id="p_weight" type="number">
    </div>
    <div class="full">
      <label>Profile Picture</label>
      <input id="p_picture" type="file" accept="image/*">
    </div>
  </div>
  <div class="actions">
    <button id="p_clear" class="btn">Clear Profile</button>
    <button id="p_save" class="btn" style="background:#10b981">Save Profile</button>
  </div>
</div>

<footer style="text-align:center;color:#94a3b8;margin-top:30px">© 2026 UPLIFT Gym</footer>

<script>
  // Load existing profile
  function loadProfile(){
    const raw = localStorage.getItem('upliftProfile');
    if(!raw) return;
    try{
      const p = JSON.parse(raw);
      document.getElementById('p_name').value = p.name || '';
      document.getElementById('p_age').value = p.age || '';
      document.getElementById('p_gender').value = p.gender || '';
      document.getElementById('p_bodyType').value = p.bodyType || '';
      document.getElementById('p_phone').value = p.phone || '';
      document.getElementById('p_blood').value = p.bloodGroup || '';
      document.getElementById('p_height').value = p.height || '';
      document.getElementById('p_weight').value = p.weight || '';
      if(p.picture){
        document.getElementById('p_pic_img').src = p.picture;
        document.getElementById('p_pic_display').style.display = 'block';
        document.getElementById('p_pic_empty').style.display = 'none';
      }else{
        document.getElementById('p_pic_display').style.display = 'none';
        document.getElementById('p_pic_empty').style.display = 'flex';
      }
    }catch(e){console.error(e)}
  }
  // Handle picture upload
  document.getElementById('p_picture').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt){
      const dataUrl = evt.target.result;
      document.getElementById('p_pic_img').src = dataUrl;
      document.getElementById('p_pic_display').style.display = 'block';
      document.getElementById('p_pic_empty').style.display = 'none';
      window.profilePicture = dataUrl;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('p_save').addEventListener('click', function(){
    const profile = {
      name: document.getElementById('p_name').value || '',
      age: document.getElementById('p_age').value || '',
      gender: document.getElementById('p_gender').value || '',
      bodyType: document.getElementById('p_bodyType').value || '',
      phone: document.getElementById('p_phone').value || '',
      bloodGroup: document.getElementById('p_blood').value || '',
      height: document.getElementById('p_height').value || '',
      weight: document.getElementById('p_weight').value || ''
    };
    if(window.profilePicture){
      profile.picture = window.profilePicture;
    }else{
      const raw = localStorage.getItem('upliftProfile');
      if(raw){
        const existing = JSON.parse(raw);
        if(existing.picture) profile.picture = existing.picture;
      }
    }
    localStorage.setItem('upliftProfile', JSON.stringify(profile));
    alert('Profile saved locally.');
  });
  document.getElementById('p_clear').addEventListener('click', function(){
    if(confirm('Clear saved profile data?')){ localStorage.removeItem('upliftProfile'); location.reload(); }
  });
  loadProfile();
</script>

</body>
</html>
