<html>

</head>
<body>

<nav>
    <div class="logo">UP<span>LIFT</span></div>
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="chest.html">Chest</a></li>
        <li><a href="back.html">Back</a></li>

        <li><a href="profile.html">Profile</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="#" class="btn">Register</a>
</nav>

<header>
    <h1>Arms Workout</h1>
</header>

<div style="margin-top:18px; margin-bottom:18px; padding: 0 20px;">
  <a class="btn" href="javascript:history.back()" style="background:#334155;">View Back</a>
</div>

<section>
    <div class="grid" id="workoutGrid"></div>
</section>

<script>
    const API_BASE = '/api';
    async function fetchWorkouts(muscle) {
        try {
            const res = await fetch(`${API_BASE}/${muscle}`);
            if (!res.ok) throw new Error('Failed to fetch');
            return await res.json();
        } catch (err) {
            console.error(err);
            return [];
        }
    }
    function renderWorkouts(workouts) {
        const container = document.getElementById('workoutGrid');
        if (!container) return;
        if (workouts.length === 0) {
            container.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:40px">Unable to load workouts right now.</p>';
            return;
        }
        container.innerHTML = workouts.map(w => `
            <div class="card">
                <img src="${w.image}" alt="${w.name}" >
                <h3>${w.name}</h3>
                <p>${w.description}</p>
                <p><strong>Reps:</strong> ${w.reps}</p>
                <p><strong>Instructions:</strong> ${w.instructions}</p>
            </div>
        `).join('');
    }
    fetchWorkouts('arms').then(renderWorkouts);
</script>

<footer>
    © 2026 UPLIFT Gym
</footer>

</body>
</html>
